services:
  - type: web
    name: onlinecatalog
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    disk:
      name: onlinecatalog-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /var/data/catalog.sqlite
      - key: DB_ENGINE
        value: sqlite
      - key: POSTGRES_RUNTIME_EXPERIMENTAL
        value: "false"
      - key: AUTO_SEED_REAL_ON_STARTUP
        value: "false"
