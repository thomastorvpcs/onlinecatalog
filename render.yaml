services:
  - type: web
    name: onlinecatalog
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: DB_ENGINE
        value: postgres
      - key: AUTO_SEED_REAL_ON_STARTUP
        value: "false"
